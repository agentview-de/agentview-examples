# Keep the example's dependencies from rotting into something people
# copy with known CVEs. Monthly cadence on purpose: this is a small,
# solo-maintained reference repo — a weekly PR firehose would be noise,
# but a yearly-stale NuGet/Action would be a real liability.

version: 2
updates:
  # NuGet packages of the .NET example application.
  #
  # Split into TWO groups on purpose. A reference example's value is a
  # known-good pinned set — the published binary was built and
  # smoke-tested against exactly these versions. So we separate by
  # blast radius:
  #
  #   • test-tooling  — xunit / test SDK / runner. CI green is a
  #                     sufficient signal; safe to merge on green.
  #   • app-runtime   — WebView2, H.NotifyIcon. These change the
  #                     shipped .exe's behaviour in the WPF/WebView2
  #                     layer that unit tests deliberately do NOT
  #                     cover. Manual review + a full smoke test
  #                     before this lands in a future release.
  #
  # Security updates still arrive as individual PRs (enable Dependabot
  # security updates in repo settings) so a CVE is never blocked
  # behind a routine version bump.
  - package-ecosystem: nuget
    directory: /applications/token-counter/dotnet
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      test-tooling:
        applies-to: version-updates
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
      app-runtime:
        applies-to: version-updates
        patterns:
          - "Microsoft.Web.WebView2"
          - "H.NotifyIcon*"

  # The GitHub Actions used by the CI + release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
