# Continuous integration for the .NET example application.
#
# Best practice for a repo people copy: every change must be proven to
# build AND pass its tests, with a visible green/red signal. The
# `examples/` folder is pure single-file HTML (nothing to compile), so
# this job is scoped to the one thing that has a build + a test suite —
# applications/token-counter/dotnet — and only runs when that code
# (or this workflow) actually changes.

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'applications/token-counter/dotnet/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'applications/token-counter/dotnet/**'
      - '.github/workflows/ci.yml'

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read   # least privilege: CI only needs to read the code

jobs:
  build-test:
    # net10.0-windows + WPF + DPAPI integration tests → Windows runner.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The app project sets <RuntimeIdentifier>win-x64</RuntimeIdentifier>
      # in a Release-only PropertyGroup (for the single-file .exe). A
      # SEPARATE `dotnet restore` does not see that Release-conditioned
      # RID, so a later `build -c Release --no-restore` fails with
      # NETSDK1047 ("assets file doesn't have a target for
      # net10.0-windows/win-x64"). Letting `build` do its own implicit,
      # RID-aware restore is the fix — and it makes CI run the *exact*
      # two commands CONTRIBUTING.md tells contributors to run locally.

      - name: Build (Release, warnings are errors)
        working-directory: applications/token-counter/dotnet
        run: dotnet build AgentViewTokenCounter.sln -c Release

      - name: Test
        working-directory: applications/token-counter/dotnet
        run: dotnet test AgentViewTokenCounter.sln -c Release --no-build --verbosity normal
