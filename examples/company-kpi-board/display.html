<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Corporate Dashboard | Alabaster</title>
  <style>
    :root {
      --bg: #F2F2F7;
      --surface: rgba(255, 255, 255, 0.75);
      --primary: #007AFF;
      --success: #34C759;
      --warning: #FF9500;
      --danger: #FF3B30;
      --text-main: #1C1C1E;
      --text-muted: #68686D;
      --glass-border: rgba(0, 0, 0, 0.05);
      
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-stack);
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Background Layers */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('./assets/bg.png') center/cover no-repeat;
      z-index: -2;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(242, 242, 247, 0.4) 0%, rgba(242, 242, 247, 0.8) 100%);
      z-index: -1;
    }

    .mesh-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
      background: 
        radial-gradient(at 0% 0%, hsla(210,100%,95%,1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(240,100%,98%,1) 0, transparent 50%),
        radial-gradient(at 100% 100%, hsla(210,100%,96%,1) 0, transparent 50%),
        radial-gradient(at 0% 100%, hsla(190,100%,98%,1) 0, transparent 50%);
      background-color: var(--bg);
    }

    header {
      padding: 30px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid var(--glass-border);
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      background: var(--primary);
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 26px;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 16px rgba(0, 122, 255, 0.2);
    }

    .brand-info h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }

    .brand-info p {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--primary);
      margin-top: 2px;
    }

    .header-info {
      text-align: right;
    }

    .clock {
      font-size: 38px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-main);
    }

    .date {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* KPI Row */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
      transition: var(--transition);
    }

    .kpi-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kpi-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .kpi-icon {
      font-size: 22px;
      color: var(--primary);
      opacity: 0.8;
    }

    .kpi-value {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -1.5px;
      color: var(--text-main);
    }

    .kpi-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
    }

    .trend-up { color: var(--success); }
    .trend-down { color: var(--danger); }
    .trend-neutral { color: var(--text-muted); }

    /* Bottom Section */
    .bottom-section {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 30px;
      flex: 1;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--primary);
      border-radius: 50%;
    }

    /* Notice Board */
    .notice-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .notice-item {
      padding: 24px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    .notice-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .notice-title { font-size: 19px; font-weight: 700; color: var(--primary); }
    .notice-date { font-size: 12px; color: var(--text-muted); font-weight: 700; }
    .notice-content { font-size: 16px; line-height: 1.6; color: var(--text-main); opacity: 0.9; }

    /* Room Status */
    .room-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 22px;
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    .room-info h4 { font-size: 17px; font-weight: 700; color: var(--text-main); }
    .room-info p { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    .status-badge {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .status-badge.occupied { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
    .status-badge.free { background: rgba(52, 199, 89, 0.1); color: var(--success); }

    /* Footer Ticker */
    footer {
      padding: 22px 50px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(25px);
      border-top: 1px solid var(--glass-border);
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-msg {
      display: inline-block;
      padding-left: 100%;
      animation: ticker-roll 40s linear infinite;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @keyframes ticker-roll {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .bottom-section { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      header { flex-direction: column; align-items: flex-start; gap: 20px; }
      .header-info { text-align: left; }
      main { padding: 30px 20px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .glass-card { padding: 24px; border-radius: 24px; }
      .kpi-value { font-size: 36px; }
    }

  </style>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="mesh-bg"></div>

  <header>
    <div class="brand">
      <div class="brand-logo" id="brand-logo">A</div>
      <div class="brand-info">
        <h1 id="company-name">Command Center</h1>
        <p>Operational Live Monitor</p>
      </div>
    </div>
    <div class="header-info">
      <div class="clock" id="clock">00:00</div>
      <div class="date" id="date">...</div>
    </div>
  </header>

  <main>
    <div class="kpi-grid" id="kpi-grid">
      <!-- KPIs injected -->
    </div>

    <div class="bottom-section" id="bottom-section">
      <div class="glass-card">
        <div class="section-title">Notice Board</div>
        <div class="notice-list" id="notice-list">
          <!-- Notices injected -->
        </div>
      </div>

      <div class="glass-card">
        <div class="section-title">Room Status</div>
        <div class="room-list" id="room-list">
          <!-- Rooms injected -->
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="ticker-msg" id="ticker-msg">System Active. Welcome to the Global Management Hub.</div>
  </footer>

  <script>
    const defaultConfig = {
      "companyName": "ACME GLOBAL HUB",
      "kpis": [
        { "label": "Q3 REVENUE", "value": "$12.4M", "trend": "+8.2%", "status": "success", "icon": "monitoring" },
        { "label": "ACTIVE CLIENTS", "value": "2,840", "trend": "+12", "status": "success", "icon": "groups" },
        { "label": "SYSTEM UPTIME", "value": "99.99%", "trend": "Stable", "status": "success", "icon": "dns" },
        { "label": "PENDING TASKS", "value": "128", "trend": "+14", "status": "warning", "icon": "task_alt" }
      ],
      "announcements": [
        { "title": "Strategy Townhall", "date": "Tomorrow, 10:00", "content": "Quarterly review and 2026 outlook. Attendance is highly encouraged." },
        { "title": "Security Update", "date": "Ongoing", "content": "Please ensure all VPN clients are updated to version 4.2 by EOD." }
      ],
      "meetingRooms": [
        { "name": "Executive Alpha", "status": "occupied", "currentMeeting": "Budget Review", "time": "14:00 - 16:00" },
        { "name": "Collaboration Beta", "status": "free", "currentMeeting": "Available", "time": "Until 17:30" },
        { "name": "Innovation Gamma", "status": "occupied", "currentMeeting": "Design Sprint", "time": "15:00 - 18:00" }
      ],
      "ticker": "GLOBAL OPS: ALL SYSTEMS NOMINAL | NASDAQ: ACME +0.8% | FTSE: +0.4%"
    };

    let config = defaultConfig;

    function renderBoard() {
      document.getElementById('company-name').textContent = config.companyName || "Command Center";
      document.getElementById('brand-logo').textContent = (config.companyName || "A").charAt(0).toUpperCase();
      document.getElementById('ticker-msg').textContent = config.ticker || "";

      const kpiEl = document.getElementById('kpi-grid');
      kpiEl.innerHTML = (config.kpis || []).map(k => {
        const trendClass = k.trend.includes('+') ? 'trend-up' : k.trend.includes('-') ? 'trend-down' : 'trend-neutral';
        const trendIcon = k.trend.includes('+') ? 'trending_up' : k.trend.includes('-') ? 'trending_down' : 'remove';
        return `
          <div class="glass-card kpi-card">
            <div class="kpi-header">
              ${k.label}
              <span class="material-symbols-outlined kpi-icon">${k.icon || 'bar_chart'}</span>
            </div>
            <div class="kpi-value">${k.value}</div>
            <div class="kpi-footer ${trendClass}">
              <span class="material-symbols-outlined" style="font-size: 18px;">${trendIcon}</span>
              ${k.trend}
            </div>
          </div>
        `;
      }).join('');

      const noticeEl = document.getElementById('notice-list');
      noticeEl.innerHTML = (config.announcements || []).map(a => `
        <div class="notice-item">
          <div class="notice-header">
            <div class="notice-title">${a.title}</div>
            <div class="notice-date">${a.date}</div>
          </div>
          <div class="notice-content">${a.content}</div>
        </div>
      `).join('');

      const roomEl = document.getElementById('room-list');
      roomEl.innerHTML = (config.meetingRooms || []).map(r => `
        <div class="room-item">
          <div class="room-info">
            <h4>${r.name}</h4>
            <p>${r.currentMeeting}</p>
          </div>
          <div class="status-badge ${r.status}">${r.status}</div>
        </div>
      `).join('');
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
      document.getElementById('date').textContent = now.toLocaleDateString([], {weekday: 'long', month: 'long', day: 'numeric'}).toUpperCase();
    }

    async function loadData() {
      try {
        const res = await fetch('./config.json', { cache: 'no-store' });
        if(res.ok) {
           const newData = await res.json();
           config = { ...config, ...newData };
        }
      } catch(e) {}
      renderBoard();
    }

    async function init() {
      renderBoard();
      updateTime();
      await loadData();
      setInterval(updateTime, 1000);
      setInterval(loadData, (config.refreshInterval || 300) * 1000);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
