<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentView Hello World</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #a1a1aa;
      --quiet: #52525b;
      
      --accent: #0A84FF;
      --accent-glow: rgba(10, 132, 255, 0.5);
      --accent-secondary: #BF5AF2;
      
      --glass-panel: rgba(20, 20, 22, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.03);
      
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-stack);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Animated Ambient Orbs */
    .orb-1 {
      position: absolute;
      width: 800px;
      height: 800px;
      top: -200px;
      left: -200px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
      filter: blur(80px);
      z-index: 0;
      animation: float 20s ease-in-out infinite alternate;
    }

    .orb-2 {
      position: absolute;
      width: 1000px;
      height: 1000px;
      bottom: -300px;
      right: -200px;
      background: radial-gradient(circle, rgba(191, 90, 242, 0.3) 0%, transparent 60%);
      filter: blur(100px);
      z-index: 0;
      animation: float 25s ease-in-out infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(100px, 50px) scale(1.1); }
      100% { transform: translate(-50px, 100px) scale(0.9); }
    }
    
    /* Fine subtle grid to give scale */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-size: 100px 100px;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
      z-index: 1;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    main {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1400px;
      padding: 64px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    /* Topline / Footer common */
    .topline, .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-size: 16px;
      font-weight: 600;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 1s ease 1s forwards;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
    }

    .signal {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(10, 132, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0); }
    }

    /* Central Glass Card */
    .hero-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero-card {
      background: var(--glass-panel);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 80px;
      box-shadow: 
        0 40px 80px rgba(0,0,0,0.5), 
        inset 0 1px 0 var(--glass-highlight);
      max-width: 1000px;
      width: 100%;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      animation: heroEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes heroEnter {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h1 {
      margin: 0;
      font-size: 110px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #FFFFFF 0%, #A1A1AA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }

    .message {
      margin: 0 auto;
      max-width: 700px;
      color: var(--muted);
      font-size: 26px;
      line-height: 1.4;
      font-weight: 500;
    }

    .time-row {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .time {
      font-size: 80px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .date {
      color: var(--quiet);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer {
      border-top: 1px solid var(--glass-border);
      padding-top: 24px;
      animation-delay: 1.2s;
    }

    .paths {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .path {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 16px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .hero-card { padding: 48px 32px; }
      h1 { font-size: 64px; }
      .message { font-size: 20px; }
      .time { font-size: 56px; }
      .date { font-size: 18px; }
      .topline, .footer { flex-direction: column; align-items: center; text-align: center; gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- Ambient Background -->
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="grid-bg"></div>

  <main>
    <header class="topline">
      <div class="label"><span class="signal"></span>AgentView Platform</div>
      <div>Start from a single file</div>
    </header>

    <div class="hero-container">
      <section class="hero-card" aria-label="Starter display">
        <h1>Hello, screen.</h1>
        <p class="message">Your first pristine display. Turn it into a dashboard, menu board, ticker, or live status screen whenever you're ready.</p>
        
        <div class="time-row">
          <div class="time" id="time">--:--</div>
          <div class="date" id="date">Loading date ...</div>
        </div>
      </section>
    </div>

    <footer class="footer">
      <div class="paths" aria-label="Delivery paths">
        <span class="path">Dashboard Integration</span>
        <span class="path">MCP Architecture</span>
        <span class="path">REST API</span>
      </div>
      <div>Edit display.html and upload it instantly.</div>
    </footer>
  </main>

  <script>
    const timeElement = document.getElementById("time");
    const dateElement = document.getElementById("date");

    function updateClock() {
      const now = new Date();
      timeElement.textContent = new Intl.DateTimeFormat("en", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now);
      dateElement.textContent = new Intl.DateTimeFormat("en", {
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(now);
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
