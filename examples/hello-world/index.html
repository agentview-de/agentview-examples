<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentView Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --text: #f4f2ec;
      --muted: #c7c7bd;
      --quiet: #8f958e;
      --accent: #36d399;
      --accent-2: #f6c945;
      --accent-3: #e65b4f;
      --line: rgba(244, 242, 236, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, var(--accent) 0 8px, transparent 8px 18px, var(--accent-2) 18px 26px, transparent 26px 36px, var(--accent-3) 36px 44px, transparent 44px),
        var(--bg);
      background-size: 100% 8px, auto;
      background-repeat: no-repeat;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: 100vw;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 64px;
    }

    .topline,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 48px;
      color: var(--quiet);
      font-size: 18px;
      font-weight: 700;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .signal {
      width: 32px;
      height: 8px;
      border-radius: 8px;
      background: var(--accent);
    }

    .hero {
      display: grid;
      align-content: center;
      gap: 32px;
      max-width: 1280px;
      padding: 48px 0;
    }

    h1 {
      margin: 0;
      max-width: 1120px;
      font-size: 88px;
      line-height: 1.04;
      font-weight: 800;
    }

    .message {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 28px;
      line-height: 1.35;
    }

    .time-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 22px;
      padding-top: 4px;
    }

    .time {
      font-size: 88px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .date {
      color: var(--quiet);
      font-size: 26px;
      font-weight: 800;
    }

    .rule {
      width: min(680px, 100%);
      height: 1px;
      background: var(--line);
    }

    .footer {
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    .footer strong {
      color: var(--text);
    }

    .paths {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .path {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
    }

    @media (max-width: 800px) {
      main {
        padding: 32px 28px;
      }

      .topline,
      .footer {
        align-items: flex-start;
        flex-direction: column;
        font-size: 17px;
      }

      .hero {
        gap: 28px;
      }

      h1 {
        font-size: 48px;
      }

      .message {
        font-size: 22px;
      }

      .time {
        font-size: 64px;
      }

      .date {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topline">
      <div class="label"><span class="signal"></span>AgentView example</div>
      <div>Single-file HTML display</div>
    </header>

    <section class="hero" aria-label="Starter display">
      <div class="rule"></div>
      <h1>Hello, screen.</h1>
      <p class="message">Start with one HTML file. Turn it into a dashboard, menu board, ticker, or live status screen whenever you need more.</p>
      <div class="time-row">
        <div class="time" id="time">--:--</div>
        <div class="date" id="date">Loading date</div>
      </div>
    </section>

    <footer class="footer">
      <div class="paths" aria-label="Delivery paths">
        <span class="path">Dashboard</span>
        <span class="path">MCP</span>
        <span class="path">REST API</span>
      </div>
      <div>Edit this file and send it to your display.</div>
    </footer>
  </main>

  <script>
    const timeElement = document.getElementById("time");
    const dateElement = document.getElementById("date");

    function updateClock() {
      const now = new Date();
      timeElement.textContent = new Intl.DateTimeFormat("en", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now);
      dateElement.textContent = new Intl.DateTimeFormat("en", {
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(now);
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
