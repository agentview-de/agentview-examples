<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plant Alpha | Performance Dashboard</title>
  <style>
    :root {
      --bg: #000000;
      --surface: rgba(28, 28, 30, 0.7);
      --primary: #007AFF;
      --success: #34C759;
      --warning: #FF9500;
      --danger: #FF3B30;
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-bg: rgba(255, 255, 255, 0.08);
      
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-stack);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('./assets/industrial_bg.png') center/cover no-repeat;
      z-index: -2;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%);
      z-index: -1;
    }

    header {
      padding: 30px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--glass-border);
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }

    .brand p {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .clock {
      font-size: 42px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: var(--text-main);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      padding: 40px 60px;
      gap: 32px;
      overflow: hidden;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Safety Card - Hero */
    .safety-card {
      grid-row: 1 / 3;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .safety-number {
      font-size: 180px;
      font-weight: 700;
      line-height: 1;
      color: var(--success);
      letter-spacing: -5px;
      text-shadow: 0 0 30px rgba(52, 199, 89, 0.3);
    }

    .safety-tag {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-main);
      margin-top: 10px;
    }

    .safety-footer {
      font-size: 16px;
      color: var(--text-muted);
      margin-top: 40px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
    }

    /* Production Card */
    .prod-stats {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
    }

    .prod-number {
      font-size: 84px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-main);
    }

    .prod-target {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 24px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }

    /* Shift Info */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 10px;
    }

    .info-item {
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
    }

    .info-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .info-value { font-size: 16px; font-weight: 600; }

    .alerts-list {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alert-box {
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 4px solid var(--primary);
      background: rgba(255, 255, 255, 0.03);
    }
    
    .alert-box.warning { border-left-color: var(--warning); color: var(--warning); background: rgba(255, 149, 0, 0.05); }
    .alert-box.danger { border-left-color: var(--danger); color: var(--danger); background: rgba(255, 59, 48, 0.05); }

  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <header>
    <div class="brand">
      <h1 id="plant-name">PLANT ALPHA - UNIT 4</h1>
      <p>Operational Excellence Dashboard</p>
    </div>
    <div class="clock" id="clock">00:00:00</div>
  </header>

  <main>
    <div class="glass-card safety-card" id="safety-card">
      <div class="card-label">Health & Safety Performance</div>
      <div class="safety-number" id="safety-days">000</div>
      <div class="safety-tag">DAYS WITHOUT ACCIDENT</div>
      <div class="safety-footer" id="safety-msg">Keep up the great work! Safety First.</div>
    </div>

    <div class="glass-card">
      <div class="card-label">Daily Production Yield</div>
      <div class="prod-stats">
        <div class="prod-number" id="prod-current">0,000</div>
        <div class="prod-target" id="prod-target">TARGET: 0,000</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prod-bar"></div>
      </div>
    </div>

    <div class="glass-card">
      <div class="card-label">Shift Status</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Current Shift</div>
          <div class="info-value" id="shift-name">---</div>
        </div>
        <div class="info-item">
          <div class="info-label">Shift Manager</div>
          <div class="info-value" id="shift-manager">---</div>
        </div>
      </div>
      <div class="alerts-list" id="alerts-container">
        <!-- Alerts go here -->
      </div>
    </div>
  </main>

  <script>
    const defaultConfig = {
      "plantName": "PLANT ALPHA - UNIT 4",
      "safety": {
        "daysWithoutAccident": 342,
        "status": "success",
        "message": "Continue prioritizing worker safety above all else."
      },
      "production": {
        "target": 5000,
        "current": 4210,
        "dailyGoalProgress": 84.2,
        "status": "warning"
      },
      "shift": {
        "currentShift": "First Shift (Day)",
        "manager": "Dr. Sarah Miller"
      },
      "alerts": [
        { "level": "info", "message": "System check on Line 4 completed." },
        { "level": "warning", "message": "Low material levels in Bin A-12." }
      ]
    };

    let config = defaultConfig;

    function applyTheme() {
       const root = document.documentElement;
       if (config.theme) {
         if(config.theme.primary) root.style.setProperty('--primary', config.theme.primary);
         if(config.theme.success) root.style.setProperty('--success', config.theme.success);
         if(config.theme.warning) root.style.setProperty('--warning', config.theme.warning);
         if(config.theme.danger) root.style.setProperty('--danger', config.theme.danger);
       }
    }

    function renderBoard() {
      document.getElementById('plant-name').textContent = config.plantName || "FACILITY";
      
      if(config.safety) {
        document.getElementById('safety-days').textContent = config.safety.daysWithoutAccident;
        document.getElementById('safety-msg').textContent = config.safety.message || "";
        const color = getComputedStyle(document.documentElement).getPropertyValue('--' + (config.safety.status || 'success')).trim();
        document.getElementById('safety-days').style.color = color;
      }

      if(config.production) {
        document.getElementById('prod-current').textContent = new Intl.NumberFormat().format(config.production.current);
        document.getElementById('prod-target').textContent = "TARGET: " + new Intl.NumberFormat().format(config.production.target);
        
        setTimeout(() => {
          document.getElementById('prod-bar').style.width = Math.min(100, Math.max(0, config.production.dailyGoalProgress)) + "%";
          const statusColor = getComputedStyle(document.documentElement).getPropertyValue('--' + (config.production.status || 'primary')).trim();
          document.getElementById('prod-bar').style.backgroundColor = statusColor;
        }, 100);
      }

      if(config.shift) {
        document.getElementById('shift-name').textContent = config.shift.currentShift;
        document.getElementById('shift-manager').textContent = config.shift.manager;
      }

      if(config.alerts) {
        const container = document.getElementById('alerts-container');
        container.innerHTML = config.alerts.map(a => `
          <div class="alert-box ${a.level === 'warning' ? 'warning' : a.level === 'danger' ? 'danger' : ''}">
             ${a.message}
          </div>
        `).join('');
      }
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second: '2-digit', hour12: false});
    }

    async function loadData() {
      try {
        const res = await fetch('./config.json', { cache: 'no-store' });
        if(res.ok) {
           const newData = await res.json();
           config = { ...config, ...newData };
        }
      } catch(e) {}
      
      applyTheme();
      renderBoard();
    }

    async function init() {
      // Immediate render
      applyTheme();
      renderBoard();
      updateTime();
      
      await loadData();
      setInterval(updateTime, 1000);
      setInterval(loadData, (config.refreshInterval || 60) * 1000);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
